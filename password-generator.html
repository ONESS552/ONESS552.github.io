<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Password Generator - ICT Student Tools</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; }
        body { font-family: sans-serif; background: var(--dark); color: white; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; color: var(--dark); }
        input { padding: 10px; width: 70%; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; margin: 10px 5px;}
        button:hover { opacity: 0.9; }
        #result { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 5px; font-weight: bold; font-family: monospace; }
        .back-link { display: block; margin-top: 20px; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔒 Secure Password Generator</h2>
        <p>Generate strong passwords instantly. Free for students & clients.</p>
        
        <label>Password Length:</label><br>
        <input type="number" id="length" value="12" min="4" max="50">
        
        <br>
        <button onclick="generatePassword()">Generate Password</button>
        
        <div id="result">Your password will appear here</div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        // JavaScript Logic
        function generatePassword() {
            const length = document.getElementById('length').value;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
            let password = "";
            
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            document.getElementById('result').innerText = password;
        }
    </script>
</body>
</html>
